# Configuration Nginx pour Laravel - Verification de Présence
#
# Ce fichier configure Nginx pour servir l'application Laravel (API)
# et le frontend React (SPA) avec HTTPS/TLS via certbot/Let's Encrypt.
#
# Utilisation :
# 1. Copier ce fichier vers /etc/nginx/sites-available/presence
# 2. Créer un lien symbolique : ln -s /etc/nginx/sites-available/presence /etc/nginx/sites-enabled/
# 3. Tester : nginx -t
# 4. Redémarrer : systemctl reload nginx
# 5. Obtenir certificat SSL : certbot --nginx -d presence.uac.bj -d api.presence.uac.bj

# ============================================================================
# UPSTREAMS
# ============================================================================

# PHP-FPM upstream (ajuster le chemin du socket selon votre installation PHP-FPM)
upstream php_fpm {
    server unix:/run/php/php8.2-fpm.sock;
    # Alternative TCP: server 127.0.0.1:9000;
    keepalive 64;
}

# ============================================================================
# REDIRECTION HTTP VERS HTTPS (Pour certbot --nginx)
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name presence.uac.bj api.presence.uac.bj;

    # Pour le challenge ACME (Let's Encrypt / certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    # Rediriger tout le reste vers HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ============================================================================
# FRONTEND REACT (SPA) - HTTPS
# ============================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name presence.uac.bj;

    root /home/prince-kangbode/Mes_projets/projet_verification_de_presence/frontend/dist;
    index index.html;

    # SSL Configuration (géré par certbot)
    # ssl_certificate /etc/letsencrypt/live/presence.uac.bj/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/presence.uac.bj/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers (ajoutés aussi par Laravel middleware, mais defense in depth)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CSP pour React SPA
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.presence.uac.bj; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Brotli compression (si module installé)
    # brotli on;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Service Worker (ne pas cacher)
    location /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback - tout vers index.html pour React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sécurité : bloquer l'accès aux fichiers sensibles
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~* \.(log|sql|sqlite)$ {
        deny all;
        return 404;
    }

    # Logs
    access_log /var/log/nginx/presence-frontend-access.log;
    error_log /var/log/nginx/presence-frontend-error.log;
}

# ============================================================================
# API LARAVEL - HTTPS
# ============================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.presence.uac.bj;

    root /home/prince-kangbode/Mes_projets/projet_verification_de_presence/backend/public;
    index index.php;

    # SSL Configuration (géré par certbot)
    # ssl_certificate /etc/letsencrypt/live/api.presence.uac.bj/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.presence.uac.bj/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CSP pour API (plus strict, pas de 'unsafe-inline')
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none';" always;

    # Client max body size (pour uploads PDF)
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/xml application/xml application/javascript application/x-javascript;

    # API routes - tout vers index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Timeouts
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 60;

        # Buffer sizes
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;

        # Security
        fastcgi_param PHP_VALUE "expose_php=off";
    }

    # Bloquer l'accès aux fichiers sensibles
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~* \.(log|sql|sqlite|env)$ {
        deny all;
        return 404;
    }

    location ~ /storage/ {
        deny all;
        return 404;
    }

    location ~ /bootstrap/ {
        deny all;
        return 404;
    }

    location ~ /config/ {
        deny all;
        return 404;
    }

    # CORS preflight (si pas géré par Laravel middleware)
    location ~* /api/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://presence.uac.bj" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-CSRF-TOKEN" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 1728000 always;
            add_header Content-Type "text/plain; charset=utf-8" always;
            add_header Content-Length 0 always;
            return 204;
        }
    }

    # Logs
    access_log /var/log/nginx/presence-api-access.log;
    error_log /var/log/nginx/presence-api-error.log;
}

