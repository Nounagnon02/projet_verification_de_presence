    # ========================================================================
    # COURSE SCHEMAS
    # ========================================================================
    CreateUeRequest:
      type: object
      required: [code, intitule, filiere_id, annee_id, semestre, volume_horaire]
      properties:
        code:
          type: string
          maxLength: 20
        intitule:
          type: string
          maxLength: 255
        filiere_id:
          type: string
          format: uuid
        annee_id:
          type: string
          format: uuid
        semestre:
          type: integer
          minimum: 1
          maximum: 6
        volume_horaire:
          type: integer
          minimum: 1

    CreateEvenementRequest:
      type: object
      required: [ec_id, filiere_id, annee_id, date, heure_debut, heure_fin]
      properties:
        ec_id:
          type: string
          format: uuid
        filiere_id:
          type: string
          format: uuid
        annee_id:
          type: string
          format: uuid
        salle_id:
          type: string
          format: uuid
        date:
          type: string
          format: date
        heure_debut:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
        heure_fin:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
        type:
          type: string
          enum: [cours, td, tp, examen, autre]
          default: cours

    CreateSalleRequest:
      type: object
      required: [nom, capacite]
      properties:
        nom:
          type: string
          maxLength: 100
        capacite:
          type: integer
          minimum: 1
        etage:
          type: integer
          minimum: 0
        batiment:
          type: string
          maxLength: 100
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        rayon_geofence_m:
          type: integer
          minimum: 1
          maximum: 1000
          default: 30
        ssid_attendu:
          type: string
          maxLength: 255
        bssid_attendu:
          type: string
          pattern: '^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$'
        ip_range_debut:
          type: string
          format: ipv4
        ip_range_fin:
          type: string
          format: ipv4
        hors_reseau:
          type: boolean
          default: false

