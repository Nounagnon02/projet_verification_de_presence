components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Laravel Sanctum SPA authentication via httpOnly cookie.
        Le token CSRF doit être envoyé dans le header `X-CSRF-TOKEN`
        (récupéré via `/sanctum/csrf-cookie` ou meta tag `csrf-token`).
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token API personnel (PAT) pour intégrations serveur-à-serveur

  parameters:
    PageParam:
      name: page
      in: query
      description: Numéro de page
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: per_page
      in: query
      description: Éléments par page (max 100)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    StudentIdParam:
      name: id
      in: path
      required: true
      description: UUID de l'étudiant
      schema:
        type: string
        format: uuid

  schemas:
    # ========================================================================
    # COMMON RESPONSES
    # ========================================================================
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string

    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
        meta:
          type: object
          properties:
            current_page:
              type: integer
            last_page:
              type: integer
            per_page:
              type: integer
            total:
              type: integer
            from:
              type: integer
            to:
              type: integer
        links:
          type: object
          properties:
            first:
              type: string
            last:
              type: string
            prev:
              type: string
            next:
              type: string

    HealthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          properties:
            database:
              type: string
              enum: [connected, disconnected]
            app:
              type: string
              enum: [running, stopped]
            version:
              type: string

    # ========================================================================
    # AUTH SCHEMAS
    # ========================================================================
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "admin@fst.uac.bj"
        password:
          type: string
          format: password
          example: "password123"
        remember:
          type: boolean
          default: false
        two_factor_code:
          type: string
          pattern: '^\d{6}$'
          description: Code 2FA si activé

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            requires_2fa:
              type: boolean

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
        etablissement_id:
          type: string
          format: uuid
        filiere_id:
          type: string
          format: uuid
        two_factor_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time

    UserResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/User'

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, email, password, password_confirmation]
      properties:
        token:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        password_confirmation:
          type: string
          format: password

    Confirm2FARequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          pattern: '^\d{6}$'

    # ========================================================================
    # PUBLIC PRESENCE SCHEMAS
    # ========================================================================
    ScanPresenceRequest:
      type: object
      required: [identifiant_unique, token, device_fingerprint]
      properties:
        identifiant_unique:
          type: string
          description: Matricule ou identifiant unique étudiant
          example: "22-12345-01"
        token:
          type: string
          format: uuid
          description: Token QR code scanné
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        device_fingerprint:
          type: string
          description: Empreinte device (fingerprintjs)
          example: "fp_abc123def456"
        scan_challenge:
          type: string
          description: Challenge cryptographique optionnel
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          description: GPS latitude
          example: 6.4281
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          description: GPS longitude
          example: 2.3575
        ssid:
          type: string
          maxLength: 255
          description: WiFi SSID détecté
          example: "UAC-LabInfo1"
        bssid:
          type: string
          pattern: '^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$'
          description: WiFi BSSID (MAC)
          example: "00:11:22:33:44:55"

    ScanPresenceResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            etudiant:
              type: string
            matricule:
              type: string
            heure:
              type: string
            cours:
              type: string
            verification:
              type: object
              properties:
                qr_valide:
                  type: boolean
                gps_valide:
                  type: [boolean, string]
                wifi_valide:
                  type: [boolean, string]
                ip_valide:
                  type: boolean
                mode:
                  type: string
                  enum: [basique, strict]
                distance_metres:
                  type: number
                salle_nom:
                  type: string
            gamification:
              type: object
              properties:
                perfect_week:
                  type: boolean
                points_awarded:
                  type: integer

    CourseByTokenResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            cours:
              type: string
            heure_debut:
              type: string
            heure_fin:
              type: string
            salle:
              type: string
            date:
              type: string
              format: date
            filiere:
              type: string
            token:
              type: string
            verification:
              type: object
              properties:
                gps_requis:
                  type: boolean
                wifi_requis:
                  type: boolean
                nom_salle:
                  type: string

    # ========================================================================
    # STUDENT SCHEMAS
    # ========================================================================
    CreateStudentRequest:
      type: object
      required: [nom, prenom, matricule, filiere_id, annee_id, email]
      properties:
        nom:
          type: string
          maxLength: 100
        prenom:
          type: string
          maxLength: 100
        matricule:
          type: string
          maxLength: 50
        filiere_id:
          type: string
          format: uuid
        annee_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        telephone:
          type: string
          maxLength: 20

    UpdateStudentRequest:
      type: object
      properties:
        nom:
          type: string
          maxLength: 100
        prenom:
          type: string
          maxLength: 100
        matricule:
          type: string
