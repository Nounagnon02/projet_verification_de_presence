            type: object
            required: [code, intitule, filiere_id, annee_id, semestre, volume_horaire]
            properties:
              code:
                type: string
                maxLength: 20
              intitule:
                type: string
                maxLength: 255
              filiere_id:
                type: string
                format: uuid
              annee_id:
                type: string
                format: uuid
              semestre:
                type: integer
                minimum: 1
                maximum: 6
              volume_horaire:
                type: integer
                minimum: 1
              ecs:
                type: array
                items:
                  type: object
                  required: [code, intitule, volume_horaire]
                  properties:
                    code:
                      type: string
                      maxLength: 20
                    intitule:
                      type: string
                      maxLength: 255
                    volume_horaire:
                      type: integer
                      minimum: 1

