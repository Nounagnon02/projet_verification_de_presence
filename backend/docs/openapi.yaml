openapi: 3.1.0
info:
  title: Système de Vérification de Présence UAC - API
  description: |
    API REST pour le système de vérification de présence de l'Université d'Abomey-Calavi (UAC).

    **Fonctionnalités principales :**
    - Authentification Laravel Sanctum (SPA mode, cookies httpOnly + CSRF)
    - Vérification triple facteur : QR Code visuel + GPS (Haversine) + WiFi (SSID/BSSID)
    - Anti-fraude : rotation token QR 60s, invalidation post-scan, device fingerprinting
    - Import IA (Gemini 2.5 Flash) pour planning PDF et catalogue cours
    - Multi-locataire (établissements) avec RBAC 8 rôles UAC
    - Exports PDF/CSV/Excel, rapports filtrés
    - Temps réel via polling (5s) + WebSocket (Laravel Reverb futur)

    **Spécifications techniques :**
    - Laravel 12 (PHP 8.2+) API + React 19 (Vite) SPA
    - Base de données : MySQL/PostgreSQL (production), SQLite (dev)
    - Cache/Queues : Redis
    - Stockage : S3-compatible / local

  version: 1.0.0
  contact:
    name: Équipe Développement UAC
    email: dev@uac.bj
    url: https://github.com/uac/presence
  license:
    name: Propriétaire UAC
    url: https://uac.bj/legal

servers:
  - url: https://api.presence.uac.bj/api
    description: Serveur de production
  - url: https://staging-api.presence.uac.bj/api
    description: Serveur de staging
  - url: http://localhost:8000/api
    description: Développement local

security:
  - sanctum: []
  - bearerAuth: []

tags:
  - name: Authentication
    description: Authentification, inscription, 2FA, sessions
  - name: Public Presence
    description: Endpoints publics pour scan QR code étudiant
  - name: Admin Dashboard
    description: Tableau de bord et statistiques administrateur
  - name: Admin Students
    description: Gestion des étudiants (CRUD, import CSV, inscriptions)
  - name: Admin Courses
    description: Gestion UEs, ECs, événements, salles, filières, années
  - name: Admin Presence
    description: Historique présences, validation manuelle, exports
  - name: Admin Imports
    description: Import IA (Gemini) planning PDF + catalogue cours
  - name: Admin Alerts
    description: Gestion des alertes/anomalies
  - name: Admin Tickets
    description: Support tickets
  - name: Admin Chat
    description: Messagerie temps réel
  - name: Admin Notifications
    description: Notifications utilisateur
  - name: Admin Profile
    description: Profil utilisateur, 2FA, sessions
  - name: Super Admin
    description: Administration multi-établissements (UAC level)
  - name: Health
    description: Monitoring et health checks

paths:
  # ========================================================================
  # HEALTH CHECK
  # ========================================================================
  /health:
    get:
      tags: [Health]
      summary: Vérification de santé de l'API
      description: |
        Endpoint de monitoring pour vérifier la disponibilité de l'API et de la base de données.
        Utilisé par les load balancers et outils de monitoring (Prometheus, Datadog, etc.).
      responses:
        '200':
          description: Service opérationnel
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                success: true
                status: healthy
                timestamp: "2026-07-09T10:30:00.000000Z"
                services:
                  database: connected
                  app: running
                  version: "1.0.0"
        '503':
          description: Service indisponible
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ========================================================================
  # AUTHENTICATION
  # ========================================================================
  /login:
    post:
      tags: [Authentication]
      summary: Connexion utilisateur (Sanctum SPA)
      description: |
        Authentification par email/mot de passe. Retourne un cookie de session httpOnly.
        Rate limiting : 5 tentatives/minute/IP (CDC 9.1).

        **Réponse :** Cookie `presence_session` (httpOnly, secure, sameSite=lax) + token CSRF dans header `X-CSRF-TOKEN`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                success: true
                message: "Connexion réussie"
                data:
                  user:
                    id: "uuid"
                    name: "Jean Dupont"
                    email: "jean.dupont@uac.bj"
                    roles: ["faculte_admin"]
                    etablissement_id: "uuid"
                  requires_2fa: false
        '401':
          description: Identifiants invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Trop de tentatives
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation échouée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /logout:
    post:
      tags: [Authentication]
      summary: Déconnexion
      description: Invalide la session et supprime les cookies.
      security:
        - sanctum: []
      responses:
        '200':
          description: Déconnexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Non authentifié

  /forgot-password:
    post:
      tags: [Authentication]
      summary: Demande de réinitialisation mot de passe
      description: Envoie un email avec lien de réinitialisation (valide 60 min).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Email envoyé si compte existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '422':
          description: Validation échouée

  /reset-password:
    post:
      tags: [Authentication]
      summary: Réinitialisation mot de passe
      description: Valide le token et définit le nouveau mot de passe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Mot de passe mis à jour
        '400':
          description: Token invalide ou expiré

  /user:
    get:
      tags: [Authentication]
      summary: Informations utilisateur connecté
      description: Retourne le profil complet de l'utilisateur authentifié.
      security:
        - sanctum: []
      responses:
        '200':
          description: Profil utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  # ========================================================================
  # PUBLIC PRESENCE (Scan QR Code - Étudiants)
  # ========================================================================
  /presence/scan:
    post:
      tags: [Public Presence]
      summary: Scanner un QR code pour valider une présence
      description: |
        **VÉRIFICATION TRIPLE FACTEUR (CDC US04 & US06) :**
        1. **QR Code visuel** : Token valide, non expiré, rotation 60s
        2. **Géolocalisation GPS** : Distance Haversine < rayon géofence salle
        3. **Réseau WiFi** : SSID/BSSID correspond à la configuration salle

        **ANTI-FRAUDE (CDC 9.2) :**
        - Invalidation immédiate du token QR après scan
        - Device fingerprint + challenge cryptographique
        - Détection cross-device (double scan appareil différent)
        - Rate limiting : 3 req/min/device

        Le QR code redirige vers `/scan?token={uuid}` sur le frontend.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScanPresenceRequest'
      responses:
        '201':
          description: Présence enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanPresenceResponse'
              example:
                success: true
                message: "Présence enregistrée avec succès."
                data:
                  etudiant: "Dupont Jean"
                  matricule: "22-12345-01"
                  heure: "08:15:32"
                  cours: "Programmation Web"
                  verification:
                    qr_valide: true
                    gps_valide: true
                    wifi_valide: true
                    ip_valide: true
                    mode: "strict"
                    distance_metres: 3.2
                    salle_nom: "Lab Info 1"
                  gamification:
                    perfect_week: true
                    points_awarded: 50
        '403':
          description: Vérification échouée (hors zone, mauvais WiFi, hors horaire)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: "Vérification de présence échouée. Vous devez être physiquement dans la salle de cours. GPS hors zone (distance: 150m, max: 30m)."
        '409':
          description: Présence déjà enregistrée ou fraude détectée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: QR Code expiré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Données invalides
        '429':
          description: Rate limit dépassé

  /presence/course-by-token/{token}:
    get:
      tags: [Public Presence]
      summary: Récupérer infos cours via token QR (CDC 7.4.1)
      description: |
        Endpoint public pour afficher les informations du cours avant scan.
        Utilisé par la page de scan QR côté étudiant.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Token QR code
      responses:
        '200':
          description: Infos cours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourseByTokenResponse'
        '404':
          description: QR Code invalide ou expiré

  # ========================================================================
  # ADMIN DASHBOARD
  # ========================================================================
  /admin/dashboard:
    get:
      tags: [Admin Dashboard]
      summary: Statistiques tableau de bord admin
      description: |
        KPIs principaux : taux de présence global, aujourd'hui, cette semaine,
        alertes non résolues, événements à venir.
      security:
        - sanctum: []
      responses:
        '200':
          description: Stats dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStatsResponse'

  /admin/dashboard/heatmap:
    get:
      tags: [Admin Dashboard]
      summary: Heatmap présence par salle/heure
      security:
        - sanctum: []
      responses:
        '200':
          description: Données heatmap

  /admin/dashboard/attendance-trend:
    get:
      tags: [Admin Dashboard]
      summary: Tendance présence sur 30 jours
      security:
        - sanctum: []
      responses:
        '200':
          description: Série temporelle

  /admin/dashboard/top-absences:
    get:
      tags: [Admin Dashboard]
      summary: Top 10 étudiants les plus absents
      security:
        - sanctum: []
      responses:
        '200':
          description: Liste top absences

  /admin/dashboard/today-events:
    get:
      tags: [Admin Dashboard]
      summary: Événements du jour
      security:
        - sanctum: []
      responses:
        '200':
          description: Liste événements aujourd'hui

  # ========================================================================
  # ADMIN STUDENTS
  # ========================================================================
  /admin/students:
    get:
      tags: [Admin Students]
      summary: Lister les étudiants (paginé, filtré)
      description: |
        Filtres disponibles : search (nom/prénom/matricule/email), filiere_id, annee_id, statut.
        Pagination : page, per_page (max 100).
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: search
          in: query
          schema: { type: string }
        - name: filiere_id
          in: query
          schema: { type: string, format: uuid }
        - name: annee_id
          in: query
          schema: { type: string, format: uuid }
        - name: statut
          in: query
          schema: { type: string, enum: [actif, inactif, diplomé] }
      responses:
        '200':
          description: Liste paginée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStudentsResponse'

    post:
      tags: [Admin Students]
      summary: Créer un étudiant
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudentRequest'
      responses:
        '201':
          description: Étudiant créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '422':
          description: Validation échouée

  /admin/students/{id}:
    get:
      tags: [Admin Students]
      summary: Détail étudiant
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
      responses:
        '200':
          description: Détail étudiant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentDetailResponse'
        '404':
          description: Non trouvé

    put:
      tags: [Admin Students]
      summary: Modifier un étudiant
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudentRequest'
      responses:
        '200':
          description: Mis à jour
        '422':
          description: Validation échouée

    delete:
      tags: [Admin Students]
      summary: Supprimer un étudiant
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
      responses:
        '200':
          description: Supprimé
        '404':
          description: Non trouvé

  /admin/students/{id}/ecs:
    get:
      tags: [Admin Students]
      summary: ECs inscrites de l'étudiant
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
      responses:
        '200':
          description: Liste ECs

  /admin/students/{id}/ecs-available:
    get:
      tags: [Admin Students]
      summary: ECs disponibles pour inscription (CDC 7.2.3)
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
      responses:
        '200':
          description: ECs disponibles

  /admin/students/{id}/ecs:
    post:
      tags: [Admin Students]
      summary: Inscrire étudiant à un EC
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollStudentRequest'
      responses:
        '201':
          description: Inscription créée

  /admin/students/{id}/ecs/{ecId}:
    delete:
      tags: [Admin Students]
      summary: Désinscrire étudiant d'un EC
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
        - name: ecId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Désinscription effectuée

  /admin/students/{id}/ecs/reset:
    post:
      tags: [Admin Students]
      summary: Réinitialiser inscriptions (nouvelle année)
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
      responses:
        '200':
          description: Inscriptions réinitialisées

  /admin/import/students:
    post:
      tags: [Admin Students]
      summary: Import étudiants par CSV (CDC 7.2)
      description: |
        Import massif via CSV avec colonnes CDC : nom, prenom, matricule, filiere, annee, email, telephone.
        Génération automatique identifiant_unique + envoi email identifiants (queue).
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImportStudentsRequest'
      responses:
        '200':
          description: Résultat import
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportStudentsResponse'

  # ========================================================================
  # ADMIN COURSES (UEs, ECs, Événements, Salles, Filières, Années)
  # ========================================================================
  /admin/ues:
    get:
      tags: [Admin Courses]
      summary: Lister UEs
      security:
        - sanctum: []
      responses:
        '200':
          description: Liste UEs

    post:
      tags: [Admin Courses]
      summary: Créer UE
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUeRequest'
      responses:
        '201':
          description: UE créée

  /admin/ues/{id}:
    get:
      tags: [Admin Courses]
      summary: Détail UE avec ECs
      security:
        - sanctum: []
      responses:
        '200':
          description: UE avec ECs

    put:
      tags: [Admin Courses]
      summary: Modifier UE
      security:
        - sanctum: []
      responses:
        '200':
          description: UE modifiée

    delete:
      tags: [Admin Courses]
      summary: Supprimer UE
      security:
        - sanctum: []
      responses:
        '200':
          description: UE supprimée

  /admin/ecs:
    get:
      tags: [Admin Courses]
      summary: Lister ECs
      security:
        - sanctum: []
      responses:
        '200':
          description: Liste ECs

    post:
      tags: [Admin Courses]
      summary: Créer EC
      security:
        - sanctum: []
      responses:
        '201':
          description: EC créé

  /admin/ecs/{id}:
    put:
      tags: [Admin Courses]
      summary: Modifier EC
      security:
        - sanctum: []
      responses:
        '200':
          description: EC modifié

    delete:
      tags: [Admin Courses]
      summary: Supprimer EC
      security:
        - sanctum: []
      responses:
        '200':
          description: EC supprimé

  /admin/evenements:
    get:
      tags: [Admin Courses]
      summary: Lister événements (cours planifiés)
      security:
        - sanctum: []
      responses:
        '200':
          description: Liste événements

    post:
      tags: [Admin Courses]
      summary: Créer événement
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvenementRequest'
      responses:
        '201':
          description: Événement créé

  /admin/evenements/{id}:
    get:
      tags: [Admin Courses]
      summary: Détail événement
      security:
        - sanctum: []
      responses:
        '200':
          description: Détail événement

    put:
      tags: [Admin Courses]
      summary: Modifier événement
      security:
        - sanctum: []
      responses:
        '200':
          description: Événement modifié

    delete:
      tags: [Admin Courses]
      summary: Supprimer événement
      security:
        - sanctum: []
      responses:
        '200':
          description: Événement supprimé

  /admin/filieres:
    get:
      tags: [Admin Courses]
      summary: Lister filières
      security:
        - sanctum: []
      responses:
        '200':
          description: Liste filières

    post:
      tags: [Admin Courses]
      summary: Créer filière
      security:
        - sanctum: []
      responses:
        '201':
          description: Filière créée

  /admin/salles:
    get:
      tags: [Admin Courses]
      summary: Lister salles
      security:
        - sanctum: []
      responses:
        '200':
          description: Liste salles

    post:
      tags: [Admin Courses]
      summary: Créer salle (avec GPS + WiFi config)
      description: |
        Configuration géolocalisation (lat/long, rayon geofence) et réseau (SSID/BSSID, plage IP).
        Utilisé pour la vérification triple facteur.
      security:
        - sanctum: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSalleRequest'
      responses:
        '201':
          description: Salle créée

  /admin/salles/{id}:
    get:
      tags: [Admin Courses]
      summary: Détail salle
      security:
        - sanctum: []
      responses:
        '200':
          description: Détail salle

    put:
      tags: [Admin Courses]
      summary: Modifier salle
      security:
        - sanctum: []
      responses:
        '200':
          description: Salle modifiée

    delete:
      tags: [Admin Courses]
      summary: Supprimer salle
      security:
        - sanctum: []
      responses:
        '200':
          description: Salle supprimée

  /admin/salles/disponibles:
    get:
      tags: [Admin Courses]
      summary: Salles disponibles pour un créneau
      security:
        - sanctum: []
      parameters:
        - name: date
          in: query
          required: true
          schema: { type: string, format: date }
        - name: heure_debut
          in: query
          required: true
          schema: { type: string, pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$' }
        - name: heure_fin
          in: query
          required: true
          schema: { type: string, pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$' }
      responses:
        '200':
          description: Salles libres

  /admin/annees-academiques:
    get:
      tags: [Admin Courses]
      summary: Lister années académiques
      security:
        - sanctum: []
      responses:
        '200':
          description: Liste années

    post:
      tags: [Admin Courses]
      summary: Créer année académique
      security:
        - sanctum: []
      responses:
        '201':
          description: Année créée

  /admin/annees-academiques/{id}/activate:
    patch:
      tags: [Admin Courses]
      summary: Activer une année (désactive les autres)
      security:
        - sanctum: []
      responses:
        '200':
          description: Année activée

  # ========================================================================
  # ADMIN PRESENCE (Historique, Validation manuelle, Exports)
  # ========================================================================
  /admin/presence/history:
    get:
      tags: [Admin Presence]
      summary: Historique présences (filtré, paginé)
      description: |
        Filtres : etudiant_id, evenement_id, filiere_id, annee_id, date_from, date_to, statut.
        Inclus relations : etudiant, evenement, ec, filiere, salle.
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: etudiant_id
          in: query
          schema: { type: string, format: uuid }
        - name: evenement_id
          in: query
          schema: { type: string, format: uuid }
        - name: filiere_id
          in: query
          schema: { type: string, format: uuid }
        - name: annee_id
          in: query
          schema: { type: string, format: uuid }
        - name: date_from
          in: query
          schema: { type: string, format: date }
        - name: date_to
          in: query
          schema: { type: string, format: date }
        - name: statut
          in: query
          schema: { type: string, enum: [valide, invalide, suspect, en_attente, rejete] }
      responses:
        '200':
          description: Historique paginé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPresencesResponse'

  /admin/presence/stats:
    get:
      tags: [Admin Presence]
      summary: Statistiques présence globales
      security:
        - sanctum: []
      responses:
        '200':
          description: Stats présence

  /admin/students/{id}/stats:
    get:
      tags: [Admin Presence]
      summary: Stats présence par étudiant
      security:
        - sanctum: []
      parameters:
        - $ref: '#/components/parameters/StudentIdParam'
      responses:
        '200':
          description: Stats étudiant

