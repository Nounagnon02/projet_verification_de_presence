                type: string
                format: uuid
              annee_id:
                type: string
                format: uuid
              date:
                type: string
                format: date
              heure_debut:
                type: string
                pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
              heure_fin:
                type: string
                pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
              salle:
                type: string
                maxLength: 100

    ValidateCoursesRequest:
      type: object
      required: [ues]
